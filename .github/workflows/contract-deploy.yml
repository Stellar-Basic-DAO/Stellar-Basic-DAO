name: Contract Deploy

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        default: 'testnet'
        type: choice
        options:
          - testnet
          - mainnet
      dry_run:
        description: 'Dry run (simulate without deploying)'
        required: false
        default: true
        type: boolean

jobs:
  deploy:
    name: Deploy Contract
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/contract

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "app/contract"

      - name: Install Stellar CLI
        run: |
          cargo install stellar-cli --locked 2>/dev/null || echo "Stellar CLI already installed"

      - name: Build release WASM
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Verify WASM artifact
        run: |
          WASM_PATH="target/wasm32-unknown-unknown/release/stellar_basic_dao.wasm"
          if [ ! -f "$WASM_PATH" ]; then
            echo "❌ WASM artifact not found at $WASM_PATH"
            ls -la target/wasm32-unknown-unknown/release/ 2>/dev/null || echo "  (release dir not found)"
            exit 1
          fi
          echo "✅ WASM artifact found: $(ls -lh $WASM_PATH | awk '{print $5}')"
          echo "wasm_path=$WASM_PATH" >> $GITHUB_OUTPUT
        id: verify-wasm

      - name: Run tests before deploy
        run: cargo test

      - name: Configure Stellar CLI network (testnet)
        if: ${{ github.event.inputs.network == 'testnet' }}
        run: |
          stellar network add testnet \
            --rpc-url "https://soroban-testnet.stellar.org" \
            --network-passphrase "Test SDF Network ; September 2015"

      - name: Configure Stellar CLI network (mainnet)
        if: ${{ github.event.inputs.network == 'mainnet' }}
        run: |
          stellar network add mainnet \
            --rpc-url "https://mainnet.stellar.org" \
            --network-passphrase "Public Global Stellar Network ; September 2015"

      - name: Deploy to testnet
        if: ${{ github.event.inputs.network == 'testnet' && github.event.inputs.dry_run == 'false' }}
        env:
          SOURCE_ACCOUNT: ${{ secrets.TESTNET_DEPLOY_KEY }}
        run: |
          echo "Deploying to testnet..."
          stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/stellar_basic_dao.wasm \
            --source "$SOURCE_ACCOUNT" \
            --network testnet

      - name: Deploy to mainnet
        if: ${{ github.event.inputs.network == 'mainnet' && github.event.inputs.dry_run == 'false' }}
        env:
          SOURCE_ACCOUNT: ${{ secrets.MAINNET_DEPLOY_KEY }}
        run: |
          echo "WARNING: Deploying to mainnet!"
          echo "Make sure governance approval has been obtained."
          stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/stellar_basic_dao.wasm \
            --source "$SOURCE_ACCOUNT" \
            --network mainnet

      - name: Dry run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "## 🧪 Dry Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This was a dry run. No contract was deployed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Network:** ${{ github.event.inputs.network }}" >> $GITHUB_STEP_SUMMARY
          echo "**WASM:** ${{ steps.verify-wasm.outputs.wasm_path }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tests:** ✅ Passed" >> $GITHUB_STEP_SUMMARY

      - name: Deploy summary
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Network:** ${{ github.event.inputs.network }}" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact:** ${{ steps.verify-wasm.outputs.wasm_path }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Update the [environment-registry.toml](app/contract/documentation/environment-registry.toml) with the deployed contract ID and WASM hash."
