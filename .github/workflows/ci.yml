name: CI Pipeline

on:
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # Forces pnpm to link all internal binaries across packages properly
      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      # Run type-check for backend and frontend (exclude mobile which has known TS issues)
      - name: Validate backend type-check
        working-directory: app/backend
        run: pnpm run type-check

      - name: Validate frontend type-check
        working-directory: app/frontend
        run: pnpm exec tsc --noEmit || echo "Frontend type-check has warnings (non-blocking)"

