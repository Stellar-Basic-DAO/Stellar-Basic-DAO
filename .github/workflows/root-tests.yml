name: Root Tests (src/)

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "jest.config.js"
      - ".github/workflows/root-tests.yml"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "jest.config.js"
      - ".github/workflows/root-tests.yml"

jobs:
  test:
    name: Test Root Source
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run root test suite
        run: pnpm test:root

      - name: TypeScript check
        run: npx tsc --noEmit
